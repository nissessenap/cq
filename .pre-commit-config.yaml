repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
        exclude: '^(cli|sdk/go)/NOTICE$'
      - id: end-of-file-fixer
        exclude: '^(cli|sdk/go)/NOTICE$'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: '(pnpm-lock\.yaml|uv\.lock)$'

  - repo: local
    hooks:
      - id: ty-check-server
        name: ty (server)
        entry: bash -c 'cd plugins/cq/server && uvx ty check cq_mcp --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^plugins/cq/server/
      - id: ty-check-server-backend
        name: ty (server/backend)
        entry: bash -c 'cd server/backend && uvx ty check src/cq_server --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^server/backend/

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock
