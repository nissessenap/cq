name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema:
    name: Validate schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: Validate fixtures against schemas
        run: make validate-schema

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/frontend/pnpm-lock.yaml

      - name: Setup and lint
        run: make setup lint-sdk-python lint-server

  test:
    name: Test
    needs: [schema, lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync Python dependencies
        run: |
          (cd sdk/python && uv sync --group dev)
          (cd plugins/cq/server && uv sync --group dev)
          (cd server/backend && uv sync --group dev)

      - name: Test
        run: make test-sdk-python test-server
