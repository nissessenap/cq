# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj
# NOTE: ldflags paths must match module path in go.mod.

version: 2

project_name: cq

before:
  hooks:
    - make -C ../sdk/go sync-skill
    - cp ../LICENSE LICENSE
    - go mod tidy

builds:
  - binary: cq
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath # Remove file system paths from binary
    ldflags:
      - -s -w
      - -X 'github.com/mozilla-ai/cq/cli/internal/version.version={{.Version}}'  # Bake in version
      - -X 'github.com/mozilla-ai/cq/cli/internal/version.commit={{.Commit}}'    # Bake in commit hash
      - -X 'github.com/mozilla-ai/cq/cli/internal/version.date={{.Date}}'        # Bake in build date

archives:
  - formats: [tar.gz]
    # name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - NOTICE
      - README.md
      - LICENSE

homebrew_casks:
  - name: cq
    repository:
      owner: mozilla-ai
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    license: Apache-2.0
    homepage: https://github.com/mozilla-ai/cq
    description: >
      cq is a shared knowledge store that helps agents avoid known pitfalls.
    directory: Casks
    # Use artifacts from the default build (OS/arch configured in builds section).
    ids:
      - default
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/cq"]
          end

changelog:
  disable: true

release:
  draft: true
  replace_existing_draft: true
  prerelease: auto
  replace_existing_artifacts: false
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
